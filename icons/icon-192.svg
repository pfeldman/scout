<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e2a27"/>
      <stop offset="100%" stop-color="#1a1814"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- Magnifying glass -->
  <circle cx="82" cy="82" r="28" fill="none" stroke="#e07a5f" stroke-width="5" stroke-linecap="round"/>
  <line x1="103" y1="103" x2="130" y2="130" stroke="#e07a5f" stroke-width="5" stroke-linecap="round"/>
  <!-- Film frame inside lens -->
  <rect x="68" y="72" width="10" height="14" rx="1.5" fill="none" stroke="#e07a5f" stroke-width="2" opacity="0.7"/>
  <rect x="82" y="72" width="10" height="14" rx="1.5" fill="none" stroke="#e07a5f" stroke-width="2" opacity="0.5"/>
  <!-- Play triangle -->
  <polygon points="76,76 76,84 83,80" fill="#e07a5f" opacity="0.6"/>
</svg>
