<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e2a27"/>
      <stop offset="100%" stop-color="#1a1814"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Magnifying glass -->
  <circle cx="218" cy="218" r="75" fill="none" stroke="#e07a5f" stroke-width="12" stroke-linecap="round"/>
  <line x1="274" y1="274" x2="346" y2="346" stroke="#e07a5f" stroke-width="12" stroke-linecap="round"/>
  <!-- Film frame inside lens -->
  <rect x="180" y="192" width="28" height="38" rx="4" fill="none" stroke="#e07a5f" stroke-width="5" opacity="0.7"/>
  <rect x="218" y="192" width="28" height="38" rx="4" fill="none" stroke="#e07a5f" stroke-width="5" opacity="0.5"/>
  <!-- Play triangle -->
  <polygon points="200,202 200,224 218,213" fill="#e07a5f" opacity="0.6"/>
</svg>
